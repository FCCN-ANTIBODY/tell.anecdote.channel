<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Floor</title>
  <!--
    The Floor (anecdote.channel#93): a barren template Tell builds and publishes.
    Served IDENTICALLY on every <name>.tell.anecdote.channel — one canonical GitHub
    Pages site that the wildcard names mask onto. The server has no obligations
    other than delivering this one page; it is not smart enough to be attacked.

    The name is a KEY, not an address: each hostname is its own hermetic browser
    origin, so making up a name mints a private local vault. By convention the
    name is the slug of the user's own data-pile (anecdote://data/<name>) — a
    PRIVATE repo, never deployed, never addressable. Its questions enter the room
    only by the owner's own gesture (pasted from cold storage, or created here).

    Deliberately self-contained (no mother-host stylesheet, no third-party bytes,
    no fetches): this page + floor.mjs + sw.js are the entire origin. The one
    outward surface is the iframe, fixed on vanilla Tell — the dumb-shell posture
    from anecdote.channel#92 ("binding the queen").
  -->
  <style>
    :root { color-scheme: light dark; }
    body { margin: 0; font: 16px/1.5 system-ui, sans-serif; display: flex; flex-direction: column; min-height: 100vh; }
    header { padding: .6rem 1rem; border-bottom: 1px solid color-mix(in srgb, currentColor 25%, transparent);
             display: flex; gap: .75rem; align-items: baseline; flex-wrap: wrap; }
    header code { font-size: .95rem; opacity: .8; }
    main { flex: 1; display: flex; flex-direction: column; }
    /* The pile view: a scrolling panel of this pile's questions beside the Tell stage.
       One page, no navigation — picking a question just re-aims the iframe. Stacks on narrow. */
    #viewer { display: none; flex: 1; flex-direction: column; min-height: 60vh; }
    #panel { overflow-y: auto; max-height: 30vh; border-bottom: 1px solid color-mix(in srgb, currentColor 25%, transparent); }
    #panel button { display: block; width: 100%; margin: 0; padding: .5rem 1rem; text-align: left;
                    border: 0; border-bottom: 1px solid color-mix(in srgb, currentColor 12%, transparent);
                    background: transparent; color: inherit; cursor: pointer; }
    #panel button:hover { background: color-mix(in srgb, currentColor 8%, transparent); }
    #panel button[aria-current="true"] { font-weight: 600; background: color-mix(in srgb, currentColor 14%, transparent); }
    #stage { flex: 1; border: 0; width: 100%; min-height: 40vh; }
    @media (min-width: 48rem) {
      #viewer { flex-direction: row; }
      #panel { max-height: none; width: 16rem; flex: 0 0 16rem; border-bottom: 0;
               border-right: 1px solid color-mix(in srgb, currentColor 25%, transparent); }
      #stage { min-height: 60vh; }
    }
    #import, #creator, #notice { padding: 1rem; max-width: 44rem; }
    #import, #creator { display: none; }
    #import textarea, #creator input, #creator textarea, #creator select { font: inherit; width: 100%; box-sizing: border-box; }
    #import textarea { min-height: 5rem; }
    #creator label { display: block; margin-top: .75rem; }
    #creator textarea { min-height: 4rem; }
    pre.artifact { padding: .6rem; overflow-x: auto; border: 1px dashed color-mix(in srgb, currentColor 35%, transparent); }
    .muted { opacity: .7; font-size: .9rem; }
    button { font: inherit; margin-top: .5rem; }
  </style>
</head>
<body>
  <header>
    <strong>Floor</strong>
    <code id="pile-address" aria-live="polite"></code>
    <span id="pile-count" class="muted" aria-live="polite"></span>
  </header>
  <main>
    <p id="notice" class="muted">…</p>
    <div id="viewer">
      <aside id="panel" aria-label="Questions in this pile"></aside>
      <iframe id="stage" title="Tell"></iframe>
    </div>
    <div id="creator"></div>
    <div id="import"></div>
  </main>
  <script type="module">
    // The service worker is registered RELATIVE so the same bytes work in both
    // placements: at /floor/ on the mother host (scope /floor/) and at / on the
    // canonical Floor site every wildcard name masks onto (scope /).
    // Every wildcard path serves this one page, so at a storage-adapter path (/storage/.<adapter>) the page
    // sits several segments deep — but its assets live at the APP ROOT (this page's own directory: "/" on the
    // canonical site, "/floor/" on the mother host). Derive that root by dropping a trailing storage facet, so
    // module + service-worker paths resolve to the real files instead of the wildcard-masked page.
    const base = location.pathname.replace(/\/storage\/\.[a-z0-9-]+\/?$/, "/").replace(/[^/]*$/, "") || "/";
    if ("serviceWorker" in navigator) navigator.serviceWorker.register(base + "sw.js", { type: "module" }).catch(() => {});
    // A /storage/.<adapter> load makes this page a storage CONSUMER. Build the `open` seam from the floor's
    // pinned platform key (floor/pin.mjs) so the adapter can iframe the engine's bottle, install its client,
    // verify it against the pin, and drive it. With no pin the seam is null and the adapter reaches for
    // nothing — the safe default; a plain pile load never touches this. The adapter modules load lazily.
    (async () => {
      const m = await import(base + "floor.mjs");
      let open = null;
      if (m.floorRole(location.pathname || "/").role === "adapter") {
        const [{ makeOpen }, { PLATFORM_KEY }] = await Promise.all([import(base + "adapter/open-seam.mjs"), import(base + "pin.mjs")]);
        open = makeOpen({ platformKey: PLATFORM_KEY });
      }
      m.boot(document, location, { open });
    })();
  </script>
  <noscript><p style="padding:1rem">The Floor needs JavaScript to open a vault.</p></noscript>
</body>
</html>

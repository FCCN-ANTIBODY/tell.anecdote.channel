# Public identity of this Tell — the entry it registers into an Atlas's _data/tells.yml.
# This is the public face of the Tell; no secrets live here. (Mirror of data-pile's
# pile.yml, one tier up: a pile registers with a Tell; a Tell registers with an Atlas.)
#
# bin/register reads this to assemble the registration entry, and reads the `signer`
# fingerprint LIVE from keys/tell.fpr — never copied here — so the published signer and
# the registered ownership anchor cannot drift.

# Stable slug for this Tell. Also the <id> segment of the tell/<scope>/<id> branch the
# registration PR is opened on.
id: tell                       # e.g. tell, fortcollins-tell, …

# Human-readable label shown in Atlas's directory.
name: "Tell (reference hub)"

# This Tell's own domain — where it fronts its piles. A listed Tell must be addressable
# here (see CONTRACT.md -> "Registering with an Atlas").
url: "https://tell.anecdote.channel"

# The jurisdiction / namespace this Tell speaks for. Also the <scope> segment of the
# tell/<scope>/<id> registration branch.
scope: colorado

# Where this Tell publishes the transparency reports an Atlas aggregates. The shape is
# described in CONSTITUTION.md ("I describe the transparency reports I publish"); an
# Atlas requires that description to list this Tell.
reports: "reports/govern-*"

# ── The boundaries this Tell asserts (notes/boundary-declaration.md; the canon lives in
# atlas.anecdote.channel/notes/boundary-canon.md). Each entry is a CLAIM: "here is a shape I
# assert, and here is what my assertion is made of." Geometry lives in boundaries/<slug>.geojson
# (pure shape, tool-round-trippable); everything about the assertion lives here. bin/boundaries
# compiles each entry + shape into a SIGNED anecdote.boundary/v1 artifact under
# boundaries/compiled/ — the form phones verify and bisect against (composer/bisect.mjs), whose
# content id is pinned below as `hash` so drift is detectable (bin/boundaries check).
#
# The listing is a LEASE: re-run `bin/boundaries renew` to re-sign the assertion with a fresh
# date (boundaries/renewals/); an Atlas computes "listed" from renewal freshness, never from a
# stored state. Relations, when needed, are declared per entry and SIGNED into the artifact:
#   derives:  { source, hash?, note }   # same referent, different bytes, ON PURPOSE (family)
#   disputes: { boundary, grounds? }    # intentional disagreement with another claim (contest)
#   proposes: { for, replaces? }        # a shape hosted for a referent we do NOT claim (wish)
# `hard: true` declares joining requires the joiner's own presence proof (a met-record at the
# door — composer/met.mjs). Default false: presence grades participation, never gates it.
boundaries:
  - slug: colorado-4
    concept: congressional-district
    label: "Colorado's 4th Congressional District (simplified)"
    file: boundaries/colorado-4.geojson
    hard: false
    basis:
      - kind: derived
        source: "US Census TIGER/Line congressional districts (118th Congress)"
        note: "post-processed to a coarse outline for demonstration"
    derives:
      source: "US Census TIGER/Line CD-118 shapefile"
      hash: null   # source-file hash not retained; the point stands without it:
      note: "simplified deliberately — vertex reduction by hand; we did something to it on purpose"
    center: [-103.5, 39.5]   # the DECLARED anchor — our center of mass, "where you'd knock" (eastern plains).
    # NOT computed from the polygon: an Atlas tests THIS point against its own shape to observe `anchored`,
    # but membership is this filing, never the geometry (a rounding sliver must never exile a member). Its
    # absence would be honest silence (anchored: null); declaring it lets a real member graduate.
    hash: "sha256:0fc5f73f55540685cf1428d8141d4bf56bd6ab8b04c1a297cc9d9aa2bf4b5edb"   # content id of boundaries/compiled/colorado-4.json — `bin/boundaries check` guards it

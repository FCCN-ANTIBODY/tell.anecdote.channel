<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} · {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ site.description }}">
  <link rel="stylesheet" href="{{ '/assets/tell.css' | relative_url }}">
</head>
<body>
  <header class="site-header">
    <a class="site-title" href="{{ '/' | relative_url }}">{{ site.title }}</a>
    <span class="site-tag">say something back</span>
  </header>
  <main>
    {{ content }}
  </main>
  <footer class="site-footer">
    <p>Tell routes one consented reply to a data-pile that Atlas reflects. No reply is sent yet.</p>
  </footer>
</body>
</html>

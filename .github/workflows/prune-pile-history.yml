name: Prune pile history

# Housekeeping for the "retain + periodic prune" custody choice, as a TEMPLATE. Feed
# branches are append-only signed-commit logs (one per fronted pile); left alone they
# grow forever. The whole of the work — archive the intact pile-signed history to
# archive/<branch>@<date>, then reset the live ref to a single fresh snapshot — lives in
# the reusable `prune-pile-history` composite action (.github/actions/prune-pile-history),
# which never invalidates a signature (see that action's prune.sh header).
#
# This workflow just wires it up against this Tell's own feed/** namespace. A workspace
# that mounts tell at tell/ and holds its own feed branches can `uses:
# ./tell/.github/actions/prune-pile-history` the same way and point
# branch-pattern/archive-prefix/identity at its own custody. Triggers are yours: the
# monthly cron below is this Tell's cadence — change or drop it.

on:
  schedule:
    - cron: "17 4 1 * *" # 04:17 UTC on the 1st of each month (cron is best-effort)
  workflow_dispatch:
    inputs:
      keep_days:
        description: "Archive+reset branches whose history is older than N days"
        default: "60"

permissions:
  contents: write

concurrency:
  group: prune-pile-history
  cancel-in-progress: false

jobs:
  prune:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: ./.github/actions/prune-pile-history
        with:
          keep-days: ${{ github.event.inputs.keep_days || '60' }}

name: "Federate · mint QR"

# Mint an authorized QR for a specific POLL on a pile this Tell fronts. The runtime
# (this Action) derives the per-pile token from TELL_QR_SECRET so the landing the QR
# opens carries a token bin/authz will later accept — bound to {pile, poll, round}.
# Output: the URL (in the run summary) + a PNG artifact you print or share.

on:
  workflow_dispatch:
    inputs:
      pile:
        description: "Pile id the QR feeds (must be in _data/piles.yml)"
        required: true
      poll:
        description: "Poll id on that pile (free-form; the token binds it)"
        required: true
      round:
        description: "Round (bump to expire an outstanding QR for this poll)"
        required: true
        default: "1"
      type:
        description: "Poll type — carried, not bound (open | broadcast | dropbox | …)"
        required: false
        default: "open"
      asker:
        description: "Originating asker address — carried, not bound"
        required: false
      question:
        description: "Poll question shown on the landing (open type)"
        required: false
      opts:
        description: "Comma-separated answer options (default: Yes,No)"
        required: false
      guidance:
        description: "Guidance shown to the respondent (format/mood). The pile governs by its own."
        required: false
      mode:
        description: "comment (onto the canonical poll issue) — the paradigm; issue is retired"
        required: false
        default: "comment"
      canonical:
        description: "Canonical poll issue number (run \"open poll\" first) — required for a credentialed QR; omit for an issueUrl-fallback-only QR"
        required: false
      run:
        description: "Run id to tell QRs/runs apart (optional; default derived from the token)"
        required: false

permissions:
  contents: read

jobs:
  qr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install qrencode + jq
        run: sudo apt-get update && sudo apt-get install -y qrencode jq
      - name: Mint authorized QR
        env:
          TELL_QR_SECRET: ${{ secrets.TELL_QR_SECRET }}
          # The semi-public POST credential the runtime uses to post the response (homebrew: a
          # repo-scoped, Issues:write, short-expiry fine-grained PAT). Optional — if unset, bin/qr
          # omits it and the landing falls back to the respondent's own GitHub auth. See
          # docs/issue-ingress.md → "Provisioning the post credential".
          TELL_POST_TOKEN: ${{ secrets.TELL_POST_TOKEN }}
          # Pass inputs via env (never interpolate into the shell) to avoid injection.
          PILE: ${{ inputs.pile }}
          POLL: ${{ inputs.poll }}
          ROUND: ${{ inputs.round }}
          TYPE: ${{ inputs.type }}
          ASKER: ${{ inputs.asker }}
          QUESTION: ${{ inputs.question }}
          OPTS: ${{ inputs.opts }}
          GUIDANCE: ${{ inputs.guidance }}
          MODE: ${{ inputs.mode }}
          CANONICAL: ${{ inputs.canonical }}
          RUN: ${{ inputs.run }}
        run: |
          set -euo pipefail
          [ -n "${TELL_QR_SECRET:-}" ] || { echo "::error::TELL_QR_SECRET secret required (see bin/tell-bootstrap)"; exit 1; }
          args=(--pile "$PILE" --poll "$POLL" --round "$ROUND" --type "${TYPE:-open}" --mode "${MODE:-comment}")
          [ -n "${ASKER:-}" ]    && args+=(--asker "$ASKER")
          [ -n "${QUESTION:-}" ] && args+=(--question "$QUESTION")
          [ -n "${OPTS:-}" ]     && args+=(--opts "$OPTS")
          [ -n "${GUIDANCE:-}" ] && args+=(--guidance "$GUIDANCE")
          [ -n "${CANONICAL:-}" ] && args+=(--canonical "$CANONICAL")
          [ -n "${RUN:-}" ]      && args+=(--run "$RUN")
          url="$(bin/qr "${args[@]}")"
          mkdir -p out; mv qr-*.png out/ 2>/dev/null || qrencode -o "out/qr-${PILE}-${POLL}-${ROUND}.png" "$url"
          { echo "## QR for \`$POLL\` on \`$PILE\` (round $ROUND)";
            echo; echo "Landing URL (encode into a QR, or use the artifact):";
            echo; echo "    $url"; } >> "$GITHUB_STEP_SUMMARY"
      - uses: actions/upload-artifact@v4
        with:
          name: qr-${{ inputs.pile }}-${{ inputs.poll }}-${{ inputs.round }}
          path: out/
          if-no-files-found: warn

name: "Federate · ingest submissions"

# The ingress loop, as a TEMPLATE. The whole of it — collect + authorize, judge against
# the delegated constitutions, seal into each pile's encrypted feed, close the mailbox —
# lives in the reusable `ingress` composite action (.github/actions/ingress). This
# workflow just wires it up; fork or submodule this Tell and keep this file as your
# starting point.
#
# Triggers are yours. This template runs on MANUAL DISPATCH by default so adopting it
# never silently starts spending Action minutes. To pick up replies automatically,
# uncomment the suggestions below and edit the cadence to your jurisdiction:
#   - `schedule` is a cron SUGGESTION — change "31 * * * *" to whatever you want, or drop it.
#   - `issues` makes a pickup fire the moment a respondent opens a submission Issue.
# Tell-the-springboard (this main repo) can stay dispatch-only; the automatic cadence
# belongs to the workspace actually fronting poll traffic.
#
# Secrets the action needs: TELL_QR_SECRET (verify QR tokens), TELL_SIGNER_KEY +
# TELL_SEED_IDENTITY (sign + ratchet the digests).

on:
  workflow_dispatch:
    inputs:
      only_id:
        description: "Ingest/deliver to just this pile id (blank = every registered pile)"
        required: false
  # --- Suggested automatic triggers — uncomment and edit to taste -------------------
  # schedule:
  #   - cron: "31 * * * *"   # hourly, best-effort; this line is the cadence you customize
  # issues:
  #   types: [opened, reopened]

permissions:
  contents: write   # push encrypted feeds to feed/** and the govern report
  issues: write     # label + close the mailbox

concurrency:
  group: ingest-submissions
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: ./.github/actions/ingress
        with:
          github-token: ${{ github.token }}
          qr-secret: ${{ secrets.TELL_QR_SECRET }}
          signer-key: ${{ secrets.TELL_SIGNER_KEY }}
          seed-identity: ${{ secrets.TELL_SEED_IDENTITY }}
          only-id: ${{ inputs.only_id }}

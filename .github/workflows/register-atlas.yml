name: "Federate · register atlas"

# Owner-initiated registration of THIS Tell with an Atlas directory. Opens a consent PR on
# the Atlas adding this Tell's entry to _data/tells.yml, on a `tell/<scope>/<id>` branch
# whose commit is SIGNED with the Tell's delivery-signer key — the branch names the
# ownership claim, the signature proves it, the entry's `signer` field anchors it. See
# CONTRACT.md -> "Registering with an Atlas".
#
# The work itself is the reusable `register` composite action (.github/actions/register),
# which any jurisdiction drops into their own Tell to list themselves on an Atlas; this
# workflow just dogfoods it over this repo's own tell.yml + keys/tell.fpr.
#
# Trust runs one way: NO write access to this Tell is requested. The cross-repo reach is the
# consent gesture of a discovery network — ATLAS_PR_TOKEN (Contents+PR write on the Atlas);
# without it the action prints the entry to paste. TELL_SIGNER_KEY is the same secret
# deliver.yml uses; without it the commit is unsigned and the claim won't verify.

on:
  workflow_dispatch:
    inputs:
      atlas:
        description: "Atlas repo to register with (owner/name)"
        required: false
        default: FCCN-ANTIBODY/atlas.anecdote.channel

permissions:
  contents: read

jobs:
  register:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/register
        with:
          atlas: ${{ inputs.atlas }}
          pr-token: ${{ secrets.ATLAS_PR_TOKEN }}
          signer-key: ${{ secrets.TELL_SIGNER_KEY }}

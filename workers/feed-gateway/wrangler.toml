# Cloudflare Worker that serves Tell's /piles/<id>/feed/* pickup surface from each
# pile's encrypted chain on Tell's own feed/<scope>/<id> branch (resolved via
# /piles.json). Deploy: wrangler deploy.
#
# Requires the Tell domain to be proxied through Cloudflare (orange-cloud) so the
# route can intercept; everything outside /piles/* falls through to the GitHub Pages
# origin. Set account_id via `CLOUDFLARE_ACCOUNT_ID` or `wrangler`.
#
# No-Cloudflare fallback: a pile can pull the same files directly from
# raw.githubusercontent.com/FCCN-ANTIBODY/tell.anecdote.channel/<feed>/inbox/* (the
# payload is encrypted), at the cost of the tell-domain URL and edge caching.
name = "tell-feed-gateway"
main = "worker.js"
compatibility_date = "2026-06-01"

# Intercept only the feed pickup path on the Tell host. The shell stays on Pages.
routes = [
  { pattern = "tell.anecdote.channel/piles/*", zone_name = "anecdote.channel" }
]
